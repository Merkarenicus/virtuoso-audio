name: CI — Build & Test (All Platforms)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  CTEST_OUTPUT_ON_FAILURE: 1

jobs:
  # ---------------------------------------------------------------------------
  # License lint — must pass before any build is attempted
  # ---------------------------------------------------------------------------
  license-lint:
    name: License Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check ASSET_MANIFEST.json license allowlist
        run: python3 ci/license_lint.py assets/hrir/ASSET_MANIFEST.json

  # ---------------------------------------------------------------------------
  # Windows x64 build + test
  # ---------------------------------------------------------------------------
  windows-x64:
    name: Windows x64
    runs-on: windows-2022
    needs: license-lint
    strategy:
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install NASM (for libsodium)
        uses: ilammy/setup-nasm@v1

      - name: Configure CMake
        run: |
          cmake -B build-win-x64 \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DVIRTUALOSO_BUILD_TESTS=ON \
            -DVIRTUALOSO_ENABLE_ASAN=${{ matrix.build_type == 'Debug' && 'ON' || 'OFF' }} \
            -A x64

      - name: Build
        run: cmake --build build-win-x64 --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build-win-x64 -C ${{ matrix.build_type }} --timeout 120

  # ---------------------------------------------------------------------------
  # Windows ARM64 build
  # ---------------------------------------------------------------------------
  windows-arm64:
    name: Windows ARM64
    runs-on: windows-2022
    needs: license-lint
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Configure CMake (ARM64)
        run: cmake -B build-win-arm64 -A ARM64 -DVIRTUALOSO_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build-win-arm64 --config Release

  # ---------------------------------------------------------------------------
  # macOS x64 + ARM64 (Apple Silicon universal)
  # ---------------------------------------------------------------------------
  macos:
    name: macOS Universal
    runs-on: macos-14
    needs: license-lint
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Configure CMake (Universal Binary)
        run: |
          cmake -B build-macos \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DVIRTUALOSO_BUILD_TESTS=ON \
            -DVIRTUALOSO_ENABLE_ASAN=ON

      - name: Build
        run: cmake --build build-macos

      - name: Test
        run: ctest --test-dir build-macos --timeout 120

  # ---------------------------------------------------------------------------
  # Linux x64 (Ubuntu 24.04)
  # ---------------------------------------------------------------------------
  linux-x64:
    name: Linux x64
    runs-on: ubuntu-24.04
    needs: license-lint
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpipewire-0.3-dev libpulse-dev \
            libsecret-1-dev libasound2-dev \
            libfreetype6-dev libcurl4-openssl-dev \
            libgl1-mesa-dev pkg-config

      - name: Configure CMake (ASAN + UBSAN)
        run: |
          cmake -B build-linux \
            -DCMAKE_BUILD_TYPE=Debug \
            -DVIRTUALOSO_BUILD_TESTS=ON \
            -DVIRTUALOSO_ENABLE_ASAN=ON \
            -DVIRTUALOSO_ENABLE_UBSAN=ON

      - name: Build
        run: cmake --build build-linux

      - name: Test
        run: ctest --test-dir build-linux --timeout 120

  # ---------------------------------------------------------------------------
  # Performance gate — only on Release builds
  # ---------------------------------------------------------------------------
  perf-gate:
    name: Performance Gate
    runs-on: ubuntu-24.04
    needs: linux-x64
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Install deps
        run: sudo apt-get install -y libpipewire-0.3-dev libpulse-dev libsecret-1-dev libasound2-dev libfreetype6-dev libcurl4-openssl-dev libgl1-mesa-dev
      - name: Build Release
        run: |
          cmake -B build-perf -DCMAKE_BUILD_TYPE=Release -DVIRTUALOSO_BUILD_TESTS=ON
          cmake --build build-perf
      - name: Run benchmark (fail if CPU > 8%)
        run: ctest --test-dir build-perf -R ConvolverBench --timeout 300
