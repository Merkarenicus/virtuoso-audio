name: Virtuoso Audio CI

on:
  push:
    branches: [ master, main, 'release/**' ]
  pull_request:
    branches: [ master, main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Windows — Visual Studio 2022, MSBuild
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows (VS 2022 x64)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28"
          ninjaVersion: "~1.11"

      # Use the bundled VS 2022 — no generator flag needed: CMakePresets.json handles it
      - name: Configure (CMakePresets)
        working-directory: 05_IMPLEMENTATION
        run: cmake --preset windows-vs2022 -DVIRTUOSO_BUILD_TESTS=ON

      - name: Build Debug
        working-directory: 05_IMPLEMENTATION
        run: cmake --build build/vs2022-x64 --config Debug --parallel 4

      - name: Run Tests
        working-directory: 05_IMPLEMENTATION
        run: ctest --preset windows-test --output-on-failure -C Debug

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: virtuoso-windows-debug
          path: 05_IMPLEMENTATION/build/vs2022-x64/Debug/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # macOS — Xcode, Universal Binary
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS (Xcode Universal)
    runs-on: macos-14   # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install dependencies (Homebrew)
        run: |
          brew install cmake ninja libsodium libsamplerate libmysofa

      - name: Configure
        working-directory: 05_IMPLEMENTATION
        run: cmake --preset macos-universal -DVIRTUOSO_BUILD_TESTS=ON

      - name: Build
        working-directory: 05_IMPLEMENTATION
        run: |
          xcodebuild -workspace build/xcode-universal/VirtuosoAudio.xcworkspace \
                     -scheme VirtuosoAudio \
                     -configuration Debug \
                     -destination "platform=macOS,arch=arm64" \
                     build

      - name: Run Tests
        working-directory: 05_IMPLEMENTATION
        run: ctest --test-dir build/xcode-universal --build-config Debug --output-on-failure

  # ---------------------------------------------------------------------------
  # Linux — GCC 13, Ninja, ASAN+UBSAN
  # ---------------------------------------------------------------------------
  build-linux:
    name: Linux (GCC 13 + ASAN)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake ninja-build gcc-13 g++-13 \
            libsodium-dev libsamplerate-dev libmysofa-dev \
            libpipewire-0.3-dev libsecret-1-dev \
            libasound2-dev libfreetype-dev libx11-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxcursor-dev libxcomposite-dev \
            mesa-common-dev pkg-config
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      - name: Configure (ASAN + UBSAN)
        working-directory: 05_IMPLEMENTATION
        run: cmake --preset linux-debug -DVIRTUOSO_BUILD_TESTS=ON

      - name: Build
        working-directory: 05_IMPLEMENTATION
        run: cmake --build build/linux-debug --parallel 4

      - name: Run Tests
        working-directory: 05_IMPLEMENTATION
        run: ctest --test-dir build/linux-debug --output-on-failure
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1

      - name: Upload Linux test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: linux-test-results
          path: 05_IMPLEMENTATION/build/linux-debug/Testing/
