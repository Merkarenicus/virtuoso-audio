name: Fuzz Tests

on:
  schedule:
    - cron: '0 2 * * 1'   # Weekly — Monday 02:00 UTC
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: 'Fuzzing duration per target (seconds)'
        default: '300'
        type: string

jobs:
  fuzz:
    name: libFuzzer — ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [ FuzzWavParser, FuzzSofaParser ]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang-17 cmake ninja-build \
            libsodium-dev libsamplerate-dev libmysofa-dev \
            libasound2-dev libfreetype-dev libx11-dev pkg-config

      - name: Configure (Clang + libFuzzer)
        working-directory: 05_IMPLEMENTATION
        run: |
          cmake -B build/fuzz -G Ninja \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DCMAKE_CXX_FLAGS="-fsanitize=fuzzer,address -fno-omit-frame-pointer" \
            -DVIRTUOSO_BUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build fuzz targets
        working-directory: 05_IMPLEMENTATION
        run: cmake --build build/fuzz --target ${{ matrix.target }} --parallel 4

      - name: Run fuzzer
        working-directory: 05_IMPLEMENTATION
        run: |
          DURATION=${{ github.event.inputs.duration_seconds || '300' }}
          ./build/fuzz/tests/fuzz/${{ matrix.target }} \
            -max_total_time=$DURATION \
            -rss_limit_mb=2048 \
            -artifact_prefix=fuzz-crashes/ \
            tests/fuzz/corpus/${{ matrix.target }}/
        env:
          ASAN_OPTIONS: detect_leaks=0

      - name: Upload crash artefacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: 05_IMPLEMENTATION/fuzz-crashes/
