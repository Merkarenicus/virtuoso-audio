name: Nightly Fuzz — WAV / SOFA / JSON Parsers

on:
  schedule:
    - cron: '0 2 * * *'  # 2:00 AM UTC nightly
  workflow_dispatch:      # Allow manual trigger

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [FuzzWavParser, FuzzSofaParser, FuzzJsonProfile]

    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install audio deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld \
            libpipewire-0.3-dev libpulse-dev libsecret-1-dev \
            libasound2-dev libfreetype6-dev libcurl4-openssl-dev libgl1-mesa-dev

      - name: Configure (Clang + libFuzzer + ASAN)
        run: |
          CC=clang CXX=clang++ cmake -B build-fuzz \
            -DCMAKE_BUILD_TYPE=Debug \
            -DVIRTUALOSO_BUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=fuzzer,address,undefined -fno-omit-frame-pointer"

      - name: Build fuzz target
        run: cmake --build build-fuzz --target ${{ matrix.target }}

      - name: Prepare corpus
        run: |
          mkdir -p fuzz_corpus/${{ matrix.target }}
          cp tests/testdata/*.wav fuzz_corpus/${{ matrix.target }}/ 2>/dev/null || true
          cp tests/testdata/*.sofa fuzz_corpus/${{ matrix.target }}/ 2>/dev/null || true

      - name: Run fuzzer (10M iterations or 30 min max)
        run: |
          ./build-fuzz/${{ matrix.target }} \
            fuzz_corpus/${{ matrix.target }}/ \
            -max_total_time=1800 \
            -runs=10000000 \
            -jobs=4 \
            -workers=4 \
            -artifact_prefix=crash_${{ matrix.target }}_
        timeout-minutes: 35

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: crash_${{ matrix.target }}_*
